name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/android/release.jks

      - name: Normalize build path
        run: |
          mv $GITHUB_WORKSPACE /tmp/build
          ln -s /tmp/build $GITHUB_WORKSPACE

      - name: Install dependencies and patch CMakeLists
        working-directory: /tmp/build
        run: |
          flutter pub get
          sed -i -e '1a add_link_options("LINKER:--build-id=none")' \
            ~/.pub-cache/hosted/pub.dev/flutter_zxing-*/*/CMakeLists.txt

      - name: Build APK (unsigned)
        working-directory: /tmp/build
        run: flutter build apk --release --split-per-abi

      - name: Re-align APKs
        run: |
          git clone --depth 1 --branch v0.3.0 https://github.com/obfusk/reproducible-apk-tools.git /tmp/rat
          for apk in $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-*-release.apk; do
            mv "$apk" unaligned.apk
            python /tmp/rat/zipalign.py --page-size 16 --pad-like-apksigner --replace unaligned.apk "$apk"
          done

      - name: Sign APKs
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ | sort -V | tail -1)
          for apk in $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-*-release.apk; do
            ${BUILD_TOOLS}apksigner sign \
              --ks $GITHUB_WORKSPACE/android/release.jks \
              --ks-pass "pass:${{ secrets.STORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              "$apk"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
